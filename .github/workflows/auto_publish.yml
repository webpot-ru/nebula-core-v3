name: Reddit Video Auto-Publish Pipeline

# ─────────────────────────────────────────────────────────────────────────────
# Publishing schedule — optimised for each audience's prime-time (local 20:00)
# and lunch-time (local 12:00), converted to UTC:
#
#  acc1 🇷🇺 Russia   MSK=UTC+3  → 09:00 UTC (12:00 MSK) / 17:00 UTC (20:00 MSK)
#  acc2 🇺🇸 English  EST=UTC-5  → 17:00 UTC (12:00 EST) / 01:00 UTC (20:00 EST)
#  acc3 🇩🇪 Germany  CET=UTC+1  → 11:00 UTC (12:00 CET) / 19:00 UTC (20:00 CET)
#  acc4 🇲🇽 LATAM    CST=UTC-6  → 18:00 UTC (12:00 CST) / 02:00 UTC (20:00 CST)
#  acc5 🇧🇷 Brazil   BRT=UTC-3  → 15:00 UTC (12:00 BRT) / 23:00 UTC (20:00 BRT)
#  acc6 🇫🇷 France   CET=UTC+1  → 11:00 UTC (12:00 CET) / 19:00 UTC (20:00 CET)
#  acc7 🇮🇹 Italy    CET=UTC+1  → 11:00 UTC (12:00 CET) / 19:00 UTC (20:00 CET)
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # ── acc1 Russia (MSK) ────────────────────────────────────────────────────
    - cron: '0 9 * * *'    # slot 1 → 12:00 MSK
    - cron: '0 17 * * *'   # slot 2 → 20:00 MSK ★ prime-time

    # ── acc2 English (EST) ───────────────────────────────────────────────────
    - cron: '0 17 * * *'   # slot 1 → 12:00 EST  (shared with acc1 slot2 run)
    - cron: '0 1 * * *'    # slot 2 → 20:00 EST ★ prime-time

    # ── acc3 Germany / acc6 France / acc7 Italy (CET) ────────────────────────
    - cron: '0 11 * * *'   # slot 1 → 12:00 CET
    - cron: '0 19 * * *'   # slot 2 → 20:00 CET ★ prime-time

    # ── acc4 LATAM (CST) ─────────────────────────────────────────────────────
    - cron: '0 18 * * *'   # slot 1 → 12:00 CST
    - cron: '0 2 * * *'    # slot 2 → 20:00 CST ★ prime-time

    # ── acc5 Brazil (BRT) ────────────────────────────────────────────────────
    - cron: '0 15 * * *'   # slot 1 → 12:00 BRT
    - cron: '0 23 * * *'   # slot 2 → 20:00 BRT ★ prime-time

  workflow_dispatch:
    inputs:
      channel:
        description: 'Channel ID to publish to (acc1 to acc7)'
        required: true
        default: 'acc4'
        type: choice
        options: [acc1, acc2, acc3, acc4, acc5, acc6, acc7]
      time_filter:
        description: 'Reddit top posts time filter, or auto for topic-family windows'
        required: true
        default: 'auto'
        type: choice
        options: [auto, day, week, month, year]
      topic_family:
        description: 'Optional single topic family for manual test runs'
        required: false
        default: 'human_drama'
        type: choice
        options: [human_drama, dark_curiosity, curiosity_facts, football_culture, internet_lore, visual_comedy]
      video_slot:
        description: 'Which video slot (1=lunch, 2=prime-time)'
        required: false
        default: '1'
        type: choice
        options: ['1', '2']
      privacy_status:
        description: 'YouTube privacy for manual runs'
        required: false
        default: 'unlisted'
        type: choice
        options: [unlisted, private, public]

# ─────────────────────────────────────────────────────────────────────────────
# Map each cron trigger to the correct channel(s) and slot
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - id: plan
        run: |
          HOUR=$(date -u +%H)   # current UTC hour (leading zero stripped below)
          H=${HOUR#0}            # strip leading zero so bash treats it as decimal

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CH="${{ github.event.inputs.channel }}"
            SLOT="${{ github.event.inputs.video_slot }}"
            TF="${{ github.event.inputs.time_filter }}"
            TOPIC="${{ github.event.inputs.topic_family }}"
            PRIV="${{ github.event.inputs.privacy_status }}"
            echo "matrix=[{\"channel\":\"${CH}\",\"slot\":\"${SLOT}\",\"time_filter\":\"${TF}\",\"topic_family\":\"${TOPIC}\",\"privacy_status\":\"${PRIV}\"}]" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Build the publish matrix based on UTC hour.
          # Scheduled runs stay unlisted until account-token readback is verified.
          # Each entry: {"channel":"accN","slot":"1or2","time_filter":"auto","privacy_status":"unlisted"}
          ENTRIES=""

          case "$H" in
            1)   # 01:00 UTC → acc2 slot2 (20:00 EST)
                 ENTRIES='[{"channel":"acc2","slot":"2","time_filter":"auto","privacy_status":"unlisted"}]' ;;
            2)   # 02:00 UTC → acc4 slot2 (20:00 CST)
                 ENTRIES='[{"channel":"acc4","slot":"2","time_filter":"auto","privacy_status":"unlisted"}]' ;;
            9)   # 09:00 UTC → acc1 slot1 (12:00 MSK)
                 ENTRIES='[{"channel":"acc1","slot":"1","time_filter":"auto","privacy_status":"unlisted"}]' ;;
            11)  # 11:00 UTC → acc3 + acc6 + acc7 slot1 (12:00 CET)
                 ENTRIES='[{"channel":"acc3","slot":"1","time_filter":"auto","privacy_status":"unlisted"},{"channel":"acc6","slot":"1","time_filter":"auto","privacy_status":"unlisted"},{"channel":"acc7","slot":"1","time_filter":"auto","privacy_status":"unlisted"}]' ;;
            15)  # 15:00 UTC → acc5 slot1 (12:00 BRT)
                 ENTRIES='[{"channel":"acc5","slot":"1","time_filter":"auto","privacy_status":"unlisted"}]' ;;
            17)  # 17:00 UTC → acc1 slot2 (20:00 MSK) + acc2 slot1 (12:00 EST)
                 ENTRIES='[{"channel":"acc1","slot":"2","time_filter":"auto","privacy_status":"unlisted"},{"channel":"acc2","slot":"1","time_filter":"auto","privacy_status":"unlisted"}]' ;;
            18)  # 18:00 UTC → acc4 slot1 (12:00 CST)
                 ENTRIES='[{"channel":"acc4","slot":"1","time_filter":"auto","privacy_status":"unlisted"}]' ;;
            19)  # 19:00 UTC → acc3 + acc6 + acc7 slot2 (20:00 CET)
                 ENTRIES='[{"channel":"acc3","slot":"2","time_filter":"auto","privacy_status":"unlisted"},{"channel":"acc6","slot":"2","time_filter":"auto","privacy_status":"unlisted"},{"channel":"acc7","slot":"2","time_filter":"auto","privacy_status":"unlisted"}]' ;;
            23)  # 23:00 UTC → acc5 slot2 (20:00 BRT)
                 ENTRIES='[{"channel":"acc5","slot":"2","time_filter":"auto","privacy_status":"unlisted"}]' ;;
            *)   ENTRIES='[]' ;;
          esac

          echo "matrix=${ENTRIES}" >> $GITHUB_OUTPUT

  publish:
    needs: resolve
    if: ${{ needs.resolve.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.resolve.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          if ! command -v google-chrome >/dev/null 2>&1 && ! command -v chromium >/dev/null 2>&1 && ! command -v chromium-browser >/dev/null 2>&1; then
            sudo apt-get install -y chromium
          fi

      - name: Resolve channel metadata
        id: target
        run: |
          CH="${{ matrix.channel }}"
          IDX="${CH//[!0-9]/}"
          echo "channel_id=${CH}"           >> $GITHUB_OUTPUT
          echo "acc_index=${IDX}"           >> $GITHUB_OUTPUT
          echo "video_slot=${{ matrix.slot }}"        >> $GITHUB_OUTPUT
          echo "time_filter=${{ matrix.time_filter }}" >> $GITHUB_OUTPUT
          echo "topic_family=${{ matrix.topic_family || '' }}" >> $GITHUB_OUTPUT
          echo "privacy_status=${{ matrix.privacy_status || 'public' }}" >> $GITHUB_OUTPUT
          echo "📺 ${CH} | slot=${{ matrix.slot }} | filter=${{ matrix.time_filter }} | topic=${{ matrix.topic_family || 'mixed' }} | privacy=${{ matrix.privacy_status || 'public' }}"

      - name: Verify YouTube channel token
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN_ACC1: ${{ secrets.YOUTUBE_REFRESH_TOKEN_ACC1 }}
          YOUTUBE_REFRESH_TOKEN_ACC2: ${{ secrets.YOUTUBE_REFRESH_TOKEN_ACC2 }}
          YOUTUBE_REFRESH_TOKEN_ACC3: ${{ secrets.YOUTUBE_REFRESH_TOKEN_ACC3 }}
          YOUTUBE_REFRESH_TOKEN_ACC4: ${{ secrets.YOUTUBE_REFRESH_TOKEN_ACC4 }}
          YOUTUBE_REFRESH_TOKEN_ACC5: ${{ secrets.YOUTUBE_REFRESH_TOKEN_ACC5 }}
          YOUTUBE_REFRESH_TOKEN_ACC6: ${{ secrets.YOUTUBE_REFRESH_TOKEN_ACC6 }}
          YOUTUBE_REFRESH_TOKEN_ACC7: ${{ secrets.YOUTUBE_REFRESH_TOKEN_ACC7 }}
        run: |
          python uploader.py --check-channel-only --account-index ${{ steps.target.outputs.acc_index }}

      - name: Fetch viral story from Reddit
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
          VECTORENGINE_API_KEY: ${{ secrets.VECTORENGINE_API_KEY }}
          AI_QUALITY_CHECK: '1'
          AI_QUALITY_FAIL_OPEN: '0'
          MAX_AI_CANDIDATES: '12'
          STORY_SIMILARITY_THRESHOLD: '0.72'
          TOPIC_FATIGUE_LOOKBACK: '10'
        run: |
          EXTRA_ARGS=()
          if [ -n "${{ steps.target.outputs.topic_family }}" ]; then
            EXTRA_ARGS+=(--topic-family "${{ steps.target.outputs.topic_family }}")
          fi
          python scraper.py \
            --channel ${{ steps.target.outputs.channel_id }} \
            --time ${{ steps.target.outputs.time_filter }} \
            --video-slot ${{ steps.target.outputs.video_slot }} \
            "${EXTRA_ARGS[@]}"



      - name: Generate VectorEngine SEO metadata
        env:
          VECTORENGINE_API_KEY: ${{ secrets.VECTORENGINE_API_KEY }}
        run: |
          python metadata_generator.py \
            --channel ${{ steps.target.outputs.channel_id }} \
            --confirm-spend \
            --output youtube_metadata.json

      - name: Translate & Generate AI33 neural voice audio
        env:
          AI33_API_KEY: ${{ secrets.AI33_API_KEY }}
          VECTORENGINE_API_KEY: ${{ secrets.VECTORENGINE_API_KEY }}
        run: |
          python translator_tts.py \
            --channel ${{ steps.target.outputs.channel_id }} \
            --with-transcript \
            --output narration.mp3

      - name: Generate storyboard JSON
        run: |
          python storyboard_generator.py \
            --input story_data.json \
            --output storyboard.json

      - name: Render dynamic MP4 video
        run: |
          python render.py \
            --storyboard storyboard.json \
            --output final_output.mp4 \
            --frame-count 300

      - name: Upload video to YouTube channel
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN_ACC1: ${{ secrets.YOUTUBE_REFRESH_TOKEN_ACC1 }}
          YOUTUBE_REFRESH_TOKEN_ACC2: ${{ secrets.YOUTUBE_REFRESH_TOKEN_ACC2 }}
          YOUTUBE_REFRESH_TOKEN_ACC3: ${{ secrets.YOUTUBE_REFRESH_TOKEN_ACC3 }}
          YOUTUBE_REFRESH_TOKEN_ACC4: ${{ secrets.YOUTUBE_REFRESH_TOKEN_ACC4 }}
          YOUTUBE_REFRESH_TOKEN_ACC5: ${{ secrets.YOUTUBE_REFRESH_TOKEN_ACC5 }}
          YOUTUBE_REFRESH_TOKEN_ACC6: ${{ secrets.YOUTUBE_REFRESH_TOKEN_ACC6 }}
          YOUTUBE_REFRESH_TOKEN_ACC7: ${{ secrets.YOUTUBE_REFRESH_TOKEN_ACC7 }}
        run: |
          python uploader.py \
            final_output.mp4 \
            ${{ steps.target.outputs.acc_index }} \
            --privacy-status ${{ steps.target.outputs.privacy_status }}

      - name: Commit and push history update
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add published_history.json
          git commit -m "chore: history [${{ steps.target.outputs.channel_id }}] slot=${{ steps.target.outputs.video_slot }} [skip ci]" || echo "No changes"
          git push origin main || echo "No changes"
