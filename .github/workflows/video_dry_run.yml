name: Dry-Run Video Render

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/video_dry_run.yml"
      - "render.py"
      - "storyboard_generator.py"
      - "sample_story_data.json"
      - "index.html"
      - "style.css"
      - "app.js"

jobs:
  render-dry-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install render system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          if ! command -v google-chrome >/dev/null 2>&1 && ! command -v google-chrome-stable >/dev/null 2>&1 && ! command -v chromium >/dev/null 2>&1 && ! command -v chromium-browser >/dev/null 2>&1; then
            sudo apt-get install -y chromium
          fi
          ffmpeg -version | head -n 1
          (google-chrome --version || google-chrome-stable --version || chromium --version || chromium-browser --version)

      - name: Check renderer syntax
        run: |
          python -m py_compile storyboard_generator.py render.py
          node --check app.js

      - name: Generate dry-run storyboard
        run: |
          python storyboard_generator.py --input sample_story_data.json --output storyboard.json

      - name: Render dry-run MP4
        run: |
          python render.py --storyboard storyboard.json --output final_output.mp4

      - name: Verify final output
        run: |
          test -s final_output.mp4
          ffprobe -v error -show_entries stream=codec_name,width,height,avg_frame_rate:format=duration,size -of json final_output.mp4

      - name: Generate preview frames
        run: |
          mkdir -p build/render/previews
          ffmpeg -hide_banner -loglevel error -y -ss 1 -i final_output.mp4 -frames:v 1 build/render/previews/preview_01.png
          ffmpeg -hide_banner -loglevel error -y -ss 11 -i final_output.mp4 -frames:v 1 build/render/previews/preview_mid.png
          ffmpeg -hide_banner -loglevel error -y -ss 20 -i final_output.mp4 -frames:v 1 build/render/previews/preview_end.png

      - name: Upload dry-run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chonkertalks-dry-run-video
          path: |
            final_output.mp4
            storyboard.json
            build/render/render_story.json
            build/render/frames_*/frame_*.png
            build/render/previews/*.png
          if-no-files-found: error
